<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papercraft MW3 Max</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #7fff6a;
      --accent-dim: rgba(127,255,106,0.12);
      --accent-border: rgba(127,255,106,0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 2.5rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 18px;
      max-width: 960px;
      margin: 0 auto;
    }

    .logo {
      width: 54px;
      height: 54px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem 2rem 4rem;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.2rem;
    }

    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.6rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-row input:focus {
      border-color: var(--accent);
    }

    .search-row input::placeholder {
      color: var(--muted);
    }

    .count {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
      color: var(--accent);
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .card-meta {
      font-size: 0.74rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .card-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-btn {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 0.83rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .card-btn:hover {
      background: rgba(127,255,106,0.2);
      border-color: rgba(127,255,106,0.5);
    }

    .card-btn svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      max-width: 960px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="54" height="54" rx="12" fill="#161616"/>
    <polygon points="27,9 43,19 43,35 27,45 11,35 11,19" fill="none" stroke="#7fff6a" stroke-width="2"/>
    <line x1="27" y1="9" x2="27" y2="45" stroke="#7fff6a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="11" y1="19" x2="43" y2="19" stroke="#7fff6a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="11" y1="35" x2="43" y2="35" stroke="#7fff6a" stroke-width="1" stroke-dasharray="3,3"/>
  </svg>
  <div>
    <h1>Papercraft MW3 Max</h1>
    <p>Plantillas y recursos para descargar gratis</p>
  </div>
</header>

<div class="container">
  <div class="search-row">
    <input type="text" id="search" placeholder="Buscar plantilla..." oninput="filter()" />
  </div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>

<footer>Papercraft MW3 Max &mdash; Todos los recursos son gratuitos</footer>

<script>
  /* =====================================================
     AGREGA TUS PDFs AQUÍ
     Cada entrada tiene:
       name  → nombre que se muestra en la tarjeta
       desc  → descripción corta
       size  → tamaño del archivo (ej: "2.1 MB")
       file  → ruta al PDF dentro de la carpeta pdfs/
               ejemplo: "ak47.pdf" → archivo en pdfs/ak47.pdf
  ===================================================== */
  const pdfs = [
    {
      name: "AK-47 Papercraft",
      desc: "Plantilla clásica del AK-47. 3 páginas en tamaño carta.",
      size: "2.1 MB",
      file: "pdfs/ak47.pdf"
    },
    {
      name: "M4A1 Papercraft",
      desc: "Rifle de asalto M4A1 con accesorios. 4 páginas.",
      size: "3.4 MB",
      file: "pdfs/m4a1.pdf"
    },
    {
      name: "Desert Eagle",
      desc: "Pistola Desert Eagle con detalle de empuñadura. 2 páginas.",
      size: "1.8 MB",
      file: "pdfs/deagle.pdf"
    }
    /* Agrega más así:
    ,{
      name: "Nombre de tu PDF",
      desc: "Descripción corta",
      size: "X.X MB",
      file: "pdfs/nombre-archivo.pdf"
    }
    */
  ];

  const pdfIcon = `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`;
  const dlIcon = `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

  function render(list) {
    const g = document.getElementById('grid');
    const c = document.getElementById('count');
    c.textContent = list.length + ' plantilla' + (list.length !== 1 ? 's' : '') + ' disponible' + (list.length !== 1 ? 's' : '');
    if (!list.length) {
      g.innerHTML = '<div class="empty">Sin resultados para tu búsqueda.</div>';
      return;
    }
    g.innerHTML = list.map(p => `
      <div class="card">
        <div class="card-top">
          <div class="card-icon">${pdfIcon}</div>
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-meta">PDF &bull; ${p.size}</div>
          </div>
        </div>
        <div class="card-desc">${p.desc}</div>
        <a class="card-btn" href="${p.file}" download>
          ${dlIcon} Descargar
        </a>
      </div>
    `).join('');
  }

  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    render(pdfs.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)));
  }

  render(pdfs);
</script>
</body>
</html>
